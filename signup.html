<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="images.png">
    <title>สมัครสมาชิก - ระบบจัดการข้อมูล</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-wrapper">
        <div class="login-box">
            <h2>สมัครสมาชิก</h2>
            <p class="subtitle">สร้างบัญชีใหม่เพื่อเข้าสู่ระบบของคุณ</p>

            <form id="signupForm">
                <div class="form-group">
                    <label for="username">ชื่อผู้ใช้งาน หรือ อีเมล</label>
                    <input type="text" id="username" placeholder="example@mail.com" autocomplete="username" required>
                </div>

                <div class="form-group">
                    <label for="password">รหัสผ่าน</label>
                    <input type="password" id="password" placeholder="••••••••" autocomplete="new-password" required>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">ยืนยันรหัสผ่าน</label>
                    <input type="password" id="confirmPassword" placeholder="••••••••" autocomplete="new-password" required>
                </div>

                <button type="submit" class="btn-login">สมัครสมาชิก</button>
                <div class="auth-footer">มีบัญชีอยู่แล้ว? <a href="index.html">เข้าสู่ระบบ</a></div>
                <div id="errorDisplay" class="error-text"></div>
            </form>
        </div>
    </div>
    <audio id="bgm" src="Dominic Fike Babydoll Lyrics.mp3" preload="auto" loop></audio>
    <div class="music-controls" id="musicPlayer">
            <span class="music-icon">🎵</span>
            <span class="song-title">Michael Jackson - Billie Jean</span>
            <button id="playBtn" class="play-button">▶️ เล่นเพลง</button>
            <button id="muteBtn" class="mute-button">🔇 ปิดเสียง</button>
    </div>
    <script src="signup.js"></script>
    <script src="script.js"></script>
</body>
</html>
