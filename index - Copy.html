<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="images.png">
    <title>myg001</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-wrapper">
        <div class="login-box">
            <h2>เข้าสู่ระบบ</h2>
            <p class="subtitle">กรุณากรอกข้อมูลเพื่อลงชื่อเข้าใช้งาน</p>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">ชื่อผู้ใช้งาน หรือ อีเมล</label>
                    <input type="text" id="username" placeholder="admin" autocomplete="username" required>
                </div>
                
                <div class="form-group">
                    <label for="password">รหัสผ่าน</label>
                    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
                </div>
                
                <button type="submit" class="btn-login">เข้าสู่ระบบ</button>
                <button type="button" class="btn-secondary" onclick="window.location.href='signup.html'">สมัครสมาชิก</button>
                <div class="auth-footer">ยังไม่มีบัญชี? <a href="signup.html">คลิกที่นี่</a></div>
                <div id="errorDisplay" class="error-text"></div>
            </form>
        </div>
    </div>
    <audio id="bgm" src="Dominic Fike Babydoll Lyrics.mp3" preload="auto" loop></audio>
    <div class="music-controls" id="musicPlayer">
            <span class="music-icon">🎵</span>
            <span class="song-title">Dominic Fike Babydoll Lyrics.mp3</span>
            <button id="playBtn" class="play-button">▶️ เล่นเพลง</button>
            <button id="muteBtn" class="mute-button">🔇 ปิดเสียง</button>
    </div>
    <script src="server.js"></script>
    <script src="script.js"></script>
</body>
</html>
